<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Analysis</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; --mut: #94a3b8; --acc: #38bdf8; --line: #334155; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { color: var(--acc); margin: 0; font-size: 2.5em; }
        header p { color: var(--mut); margin-top: 5px; }
        .controls { background: var(--card); max-width: 1550px; margin: 0 auto 20px; padding: 15px 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--line); }
        .legend { background: var(--bg); padding: 8px 15px; border-radius: 6px; border: 1px solid var(--line); font-size: 0.9em; color: var(--mut); display: flex; gap: 15px; }
        .legend strong { color: var(--acc); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--line); display: flex; flex-direction: column; position: relative; }
        .full { grid-column: 1 / -1; }
        select { padding: 8px 12px; margin-left: 10px; border-radius: 6px; background: var(--bg); color: #fff; border: 1px solid var(--line); cursor: pointer; }
        .tip { position: absolute; background: rgba(15,23,42,0.95); padding: 12px; border-radius: 8px; border: 1px solid var(--acc); pointer-events: none; opacity: 0; font-size: 14px; z-index: 100; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        svg { width: 100%; height: auto; display: block; overflow: visible; }
        .label { font-size: 15px; font-weight: 600; fill: var(--acc); text-anchor: middle; }
        .tick text { fill: var(--mut); font-size: 13px; }
        .dim { opacity: 0.15 !important; transition: opacity 0.2s; }
        .act { opacity: 1 !important; stroke: #fff !important; stroke-width: 2.5px !important; }
    </style>
</head>
<body>

    <header>
        <h1>Population Analysis</h1>
        <p>Muqeem Ahmed Soomro (2023561) | DS351L Lab 10</p>
    </header>

    <div class="controls">
        <div><strong>Rank By: </strong>
            <select id="sel"><option value="pop">Population</option><option value="area">Area (Km²)</option><option value="den">Density</option></select>
        </div>
        <div class="legend"><span><strong>k</strong>=Thousands</span><span><strong>M</strong>=Millions</span><span><strong>B</strong>=Billions</span></div>
    </div>

    <div class="grid">
        <div class="card full"><h3 style="margin:0 0 10px;color:var(--acc)">Top 15 Countries</h3><div id="c1"></div></div>
        <div class="card"><h3 style="text-align:center;margin:0 0 10px;color:var(--acc)">Age vs. Fertility</h3><div id="c2"></div></div>
        <div class="card"><h3 style="text-align:center;margin:0 0 5px;color:var(--acc)">Urbanization & Area</h3><p style="text-align:center;font-size:.9em;margin:0 0 10px;color:var(--mut)">Size = Urban %</p><div id="c3"></div></div>
    </div>
    <div id="tip" class="tip"></div>

    <script>
        d3.csv("world-population-by-country-2020.csv", d => ({
            id: d["Country (or dependency)"],
            pop: +d["Population 2020"].replace(/,/g, ""),
            area: +d["Land Area (Km²)"].replace(/,/g, ""),
            den: +d["Density  (P/Km²)"].replace(/,/g, ""),
            fert: d["Fert. Rate"] === "N.A." ? null : +d["Fert. Rate"],
            age: d["Med. Age"] === "N.A." ? null : +d["Med. Age"],
            urb: d["Urban Pop %"] === "N.A." ? 0 : +d["Urban Pop %"].replace("%", "")
        })).then(raw => {
            const data = raw.filter(d => d.fert && d.age && d.area > 0 && d.pop > 0);
            const tip = d3.select("#tip"), fmt = d => d3.format(".2s")(d).replace("G", "B");
            const col = d3.scaleOrdinal(d3.schemeTableau10);
            const getCol = n => n === "Pakistan" ? "#006600" : col(n);

            // Setup SVGs compactly
            const m1 = {t:20, r:50, b:60, l:150}, w1 = 1200 - m1.l - m1.r, h1 = 500 - m1.t - m1.b;
            const s1 = d3.select("#c1").append("svg").attr("viewBox","0 0 1200 500").append("g").attr("transform",`translate(${m1.l},${m1.t})`);
            const m2 = {t:30, r:40, b:60, l:70}, w2 = 600 - m2.l - m2.r, h2 = 450 - m2.t - m2.b;
            const [s2, s3] = ["#c2", "#c3"].map(id => d3.select(id).append("svg").attr("viewBox","0 0 600 450").append("g").attr("transform",`translate(${m2.l},${m2.t})`));

            // Scales
            const x1 = d3.scaleLinear().range([0, w1]), y1 = d3.scaleBand().range([0, h1]).padding(0.2);
            const x2 = d3.scaleLinear().domain([10, 55]).range([0, w2]), y2 = d3.scaleLinear().domain([0, 8]).range([h2, 0]);
            const x3 = d3.scaleLog().domain([10, d3.max(data, d=>d.area)*2]).range([0, w2]);
            const y3 = d3.scaleLog().domain([1000, d3.max(data, d=>d.pop)*2]).range([h2, 0]);
            const r3 = d3.scaleLinear().domain([0, 100]).range([4, 25]);

            // Axes & Labels (Bar)
            const ax1 = s1.append("g").attr("transform",`translate(0,${h1})`), ay1 = s1.append("g");
            const lx1 = s1.append("text").attr("class","label").attr("x",w1/2).attr("y",h1+45);
            s1.append("text").attr("class","label").attr("transform","rotate(-90)").attr("y",-130).attr("x",-h1/2).text("Country");

            // Axes & Labels (Scatter & Bubble)
            s2.append("g").attr("transform",`translate(0,${h2})`).call(d3.axisBottom(x2)); s2.append("g").call(d3.axisLeft(y2));
            s3.append("g").attr("transform",`translate(0,${h2})`).call(d3.axisBottom(x3).ticks(5).tickFormat(fmt)); s3.append("g").call(d3.axisLeft(y3).ticks(5).tickFormat(fmt));
            const addL = (s, x, y, a, b) => { s.append("text").attr("class","label").attr("x",x/2).attr("y",y+45).text(a); s.append("text").attr("class","label").attr("transform","rotate(-90)").attr("y",-45).attr("x",-y/2).text(b); };
            addL(s2, w2, h2, "Median Age", "Fertility Rate"); addL(s3, w2, h2, "Land Area (Km²)", "Population");

            // Interactions
            const hover = (e, d) => {
                d3.selectAll("rect, circle").classed("dim", x => x.id !== d.id).classed("act", x => x.id === d.id);
                tip.style("opacity",1).html(`<strong>${d.id}</strong><br>Pop: ${d.pop.toLocaleString()}<br>Age: ${d.age}<br>Fertility: ${d.fert}`).style("left",(e.pageX+15)+"px").style("top",(e.pageY-15)+"px");
            };
            const out = () => { d3.selectAll("rect, circle").classed("dim",0).classed("act",0); tip.style("opacity",0); };

            const update = () => {
                const m = d3.select("#sel").property("value");
                lx1.text(d3.select("#sel option:checked").text());
                const top = [...data].sort((a,b) => b[m] - a[m]).slice(0, 15);
                
                x1.domain([0, d3.max(top, d=>d[m])*1.05]); y1.domain(top.map(d=>d.id));
                ax1.transition().duration(800).call(d3.axisBottom(x1).ticks(6).tickFormat(fmt)); ay1.transition().duration(800).call(d3.axisLeft(y1));

                s1.selectAll("rect").data(top, d=>d.id).join("rect").attr("y", d=>y1(d.id)).attr("height", y1.bandwidth()).attr("rx", 4).attr("fill", d=>getCol(d.id)).on("mouseover",hover).on("mouseout",out).transition().duration(800).attr("width", d=>x1(d[m]));
                s2.selectAll("circle").data(data).join("circle").attr("cx", d=>x2(d.age)).attr("cy", d=>y2(d.fert)).attr("r", 6).attr("fill", d=>getCol(d.id)).on("mouseover",hover).on("mouseout",out);
                s3.selectAll("circle").data(data).join("circle").attr("cx", d=>x3(d.area)).attr("cy", d=>y3(d.pop)).attr("r", d=>r3(d.urb)).attr("fill", d=>getCol(d.id)).attr("opacity",0.7).on("mouseover",hover).on("mouseout",out);
            };

            d3.select("#sel").on("change", update); update();
        });
    </script>
</body>
</html>
